<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Gerador de Evolução</title>

<style>

body{
background:#121212;
color:#e4e4e4;
font-family:Arial;
max-width:900px;
margin:auto;
padding:30px;
}

h1{
text-align:center;
margin-bottom:30px;
}

textarea{
width:100%;
background:#1e1e1e;
color:#e4e4e4;
border:1px solid #333;
border-radius:6px;
padding:10px;
font-size:14px;
}

button{
background:#2f6fed;
border:none;
padding:10px 18px;
margin:5px;
color:white;
border-radius:6px;
cursor:pointer;
font-size:14px;
}

button:hover{
background:#1f5ad6;
}

.botoes{
margin:15px 0;
}

.resultado{
margin-top:20px;
}

.lista{
margin-top:10px;
background:#1e1e1e;
padding:10px;
border-radius:6px;
}

</style>
</head>

<body>

<h1>Gerador de Evolução de Dispensação</h1>

<p>1. Ctrl+A na tela do Celk</p>
<p>2. Ctrl+C</p>
<p>3. Clique em <b>Colar do Celk</b></p>

<textarea id="entrada" rows="12" placeholder="Cole aqui o conteúdo copiado"></textarea>

<div class="botoes">

<button onclick="colarDoClipboard()">Colar do Celk</button>
<button onclick="gerarEvolucao()">Gerar evolução</button>
<button id="btnCopiar" onclick="copiarTexto()">Copiar texto</button>

</div>

<div class="resultado">

<h3>Texto gerado</h3>

<textarea id="saida" rows="10"></textarea>

<h3>Medicamentos identificados</h3>

<div id="lista" class="lista"></div>

</div>

<script>

const controlados = [
"AMITRIPTILINA","BIPERIDENO","CARBAMAZEPINA","CARBONATO",
"CLONAZEPAM","CLORPROMAZINA","DIAZEPAM","FENITOINA",
"FENOBARBITAL","FLUOXETINA","HALOPERIDOL","IMIPRAMINA",
"LEVOMEPROMAZINA","METILFENIDATO","MORFINA","RISPERIDONA",
"SERTRALINA"
]

const agudos = [
"DIPIRONA","PARACETAMOL","IBUPROFENO",
"AMOXICILINA","AZITROMICINA","MIKANIA"
]

function normalizar(txt){

return txt
.toUpperCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"")

}

function gerarEvolucao(){

const texto = document.getElementById("entrada").value

const linhas = texto.split("\n")

let medicamentos=[]
let profissional=""
let data=""

for(let i=0;i<linhas.length;i++){

const l=linhas[i].trim()

if(l.includes("Profissional")){
profissional=linhas[i+1].replace("×","").trim()
}

if(l.includes("Data da Prescrição")){
data=linhas[i+1].trim()
}

if(l.match(/\(\s*\d+\s*\)/)){

const nome=linhas[i].replace(/\(.*\)/,"").trim()

const unidade=linhas[i+1]?.trim()

const quantidade=linhas[i+6]?.replace(",",".").trim()

const retorno=linhas[i+8]?.trim()

if(!isNaN(parseFloat(quantidade))){

medicamentos.push({
nome:nome,
principio:normalizar(nome).split(" ")[0],
texto:parseInt(quantidade)+" "+unidade+" "+nome,
retorno:retorno
})

}

}

}

if(medicamentos.length===0){
alert("Nenhum medicamento identificado")
return
}

let lista=""

medicamentos.forEach(m=>{
lista+="• "+m.texto+"\n"
})

let controladosLista=[]
let continuoDatas=[]

medicamentos.forEach(m=>{

if(!m.retorno.match(/\d{2}\/\d{2}\/\d{4}/)) return

if(controlados.includes(m.principio)){
controladosLista.push("• "+m.nome+" em "+m.retorno)
}
else if(!agudos.includes(m.principio)){
continuoDatas.push(m.retorno)
}

})

let textoFinal="Paciente comparece à farmácia para retirada de medicamentos.\n\n"

textoFinal+="Foram dispensados:\n"+lista+"\n"

textoFinal+=`Receita prescrita por ${profissional} em ${data}.\n\n`

textoFinal+="Orientado quanto ao uso correto das medicações.\n\n"

if(controladosLista.length){

textoFinal+="Medicamentos de uso controlado com previsão de nova dispensação com nova receita médica a partir de:\n"

controladosLista.forEach(c=>{
textoFinal+=c+"\n"
})

textoFinal+="\n"

}

if(continuoDatas.length){

continuoDatas.sort()

textoFinal+="Medicamentos de uso contínuo com previsão de nova dispensação a partir de "+continuoDatas[0]+"."

}

document.getElementById("saida").value=textoFinal

const listaDiv=document.getElementById("lista")
listaDiv.innerHTML=""

medicamentos.forEach(m=>{
listaDiv.innerHTML+="<div>"+m.texto+"</div>"
})

}

async function colarDoClipboard(){

try{

const texto = await navigator.clipboard.readText()

document.getElementById("entrada").value=texto

gerarEvolucao()

}catch{

alert("Não foi possível acessar a área de transferência")

}

}

function copiarTexto(){

const saida=document.getElementById("saida")
const botao=document.getElementById("btnCopiar")

saida.select()
document.execCommand("copy")

botao.innerText="Copiado ✓"
botao.style.background="#2e7d32"

setTimeout(()=>{
botao.innerText="Copiar texto"
botao.style.background="#2f6fed"
},2000)

}

</script>

</body>
</html>
