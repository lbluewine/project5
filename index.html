<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador de Evolução</title>

<script async src="https://www.googletagmanager.com/gtag/js?id=G-Z94VEBJLKH"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'G-Z94VEBJLKH');
</script>

<style>
body{
    font-family: Arial;
    background:#121212;
    color:#e4e4e4;
    margin:40px;
}

.container{
    max-width:900px;
    margin:auto;
    background:#1e1e1e;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px rgba(0,0,0,0.6);
}

textarea{
    width:100%;
    padding:10px;
    margin-top:10px;
    margin-bottom:15px;
    background:#2a2a2a;
    color:#ffffff;
    border:1px solid #444;
    border-radius:6px;
}

textarea:focus{
    outline:none;
    border-color:#6aa9ff;
}

button{
    padding:10px 20px;
    margin-right:10px;
    cursor:pointer;
    border:none;
    border-radius:6px;
    background:#2f6fed;
    color:white;
    font-weight:bold;
    transition: background 0.25s, transform 0.1s;
}

button:hover{
    background:#1f56c5;
}

#btnMagico {
    background: #00897b;
    font-size: 16px;
    padding: 15px 20px;
    width: 100%;
    margin-bottom: 25px;
}

#btnMagico:hover {
    background: #00695c;
}

.result{
    white-space:pre-line;
    background:#2a2a2a;
    padding:15px;
    border:1px solid #444;
    border-radius:6px;
}

ul{
    padding-left:20px;
}

li{
    margin-bottom:4px;
}

h2,h3{
    color:#ffffff;
}

p{
    color:#cfcfcf;
}
</style>
</head>

<body>

<div class="container">

<h2>1. Ctrl+A + Ctrl+C na tela da dispensação | 2. Clique no gerar evolução</h2>

<button id="btnMagico" onclick="processarTudo()">Gerar Evolução</button>

<hr style="border: 1px solid #333; margin-bottom: 20px;">

<textarea id="entrada" rows="6"></textarea>

<br>

<button onclick="gerar()">Gerar Evolução</button>
<button id="botaoCopiar" onclick="copiar()">Copiar texto</button>

<h3>Texto gerado</h3>
<div id="saida" class="result"></div>

<h3>Medicamentos identificados</h3>
<ul id="lista"></ul>

</div>

<script>
const medicacoesControladas = new Set([
"AMITRIPTILINA", "BIPERIDENO", "CARBAMAZEPINA", "LITIO",
"CLONAZEPAM", "CLORPROMAZINA", "DIAZEPAM", "FENITOINA",
"FENOBARBITAL", "FLUOXETINA", "HALOPERIDOL", "IMIPRAMINA",
"LEVOMEPROMAZINA", "METILFENIDATO", "MORFINA", "RISPERIDONA", "SERTRALINA"
]);

const medicacoesAgudas = new Set([
"DIPIRONA", "PARACETAMOL", "IBUPROFENO", "ACETILCISTEINA", "CALCIO", "DEXAMETASONA", "ACICLOVIR", "DICLOFENACO", 
"FLUCONAZOL", "IVERMECTINA", "NEOMICINA","LIDOCAINA", "METOCLOPRAMIDA", "PERMETRINA", "SAIS", "PREDNISOLONA",
"AMOXICILINA", "AZITROMICINA", "MIKANIA", "CEFALEXINA",
"AMOXICILINA", "BENZILPENICILINA", "CLARITROMICINA", "CIPROFLOXACINO", "CEFITRIAXONA", "METRONIDAZOL",
"SULFAMETOXAZOL", "NITROFURANTOINA", "SERINGA", "AGULHA", "FITA"
]);

const mapaUnidades = {
    "CP": "cp",
    "CAP": "cp",
    "FR": "fr",
    "AMP": "amp",
    "TB": "tb",
    "ML": "ml",
    "G": "g",
    "MG": "mg",
    "U": "uni",
    "UN": "uni",
    "ENV": "env",
    "CX": "cx",
    "PCT": "pacote(s)",
    "VD": "vidro(s)",
    "FA": "frasco-ampola",
    "BGO": "bisnaga(s)",
    "SER": "seringa(s)",
    "GTS": "gotas"
};

function normalizarNome(nome){
    return nome.toUpperCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
}

function limparQuantidade(valor){
    valor = valor.replace(/\./g,"").replace(",",".");
    return parseInt(parseFloat(valor));
}

function extrairDados(texto){
    let dados = { 
        paciente:"Não identificado", 
        profissional:"____________", 
        data_prescricao:"____________", 
        medicamentos:[] 
    };

    let paciente = texto.match(/Paciente\s*\n?\(\d+\)\s*([^\n]+)/);
    if(paciente) dados.paciente = paciente[1].trim();

    // --- NOVA LÓGICA DE EXTRAÇÃO DE PROFISSIONAL ---
    let profSemVinculo = texto.match(/Profissional Sem Vínculo([A-ZÀ-Ÿ][^\n×]*)/i);
    if (profSemVinculo) {
        dados.profissional = profSemVinculo[1].trim();
    } else {
        let profNormal = texto.match(/Profissional\s*\n?([A-ZÀ-Ÿ][^\n×]*)/i);
        if (profNormal && !profNormal[1].toUpperCase().includes("SEM VÍNCULO")) {
            dados.profissional = profNormal[1].trim();
        }
    }

    let prescricao = texto.match(/Data da Prescrição\s*\n(\d{2}\/\d{2}\/\d{4})/);
    if(prescricao) dados.data_prescricao = prescricao[1];

    let blocos = texto.split(/\n\s*\(\s*\d+\s*\)\s*/);

    for(let i = 1; i < blocos.length; i++){
        let linhas = blocos[i].split("\n").map(l => l.trim()).filter(l => l);
        
        if(linhas.length < 5) continue;

        let nomeOriginal = linhas[0];
        let unidadeBruta = linhas[1].toUpperCase();
        
        if(!mapaUnidades[unidadeBruta]) continue;

        let unidadeConvertida = mapaUnidades[unidadeBruta];
        let quantidade = null;
        let retorno = "";

        for (let j = linhas.length - 1; j >= 2; j--) {
            let val = linhas[j];

            if (!retorno && /^\d{2}\/\d{2}\/\d{4}$/.test(val)) {
                retorno = val;
                continue;
            }

            if (quantidade === null && /^\d+([.,]\d+)?$/.test(val)) {
                quantidade = limparQuantidade(val);
                break;
            }
        }

        if (quantidade === null) continue;

        let nomeNormalizado = normalizarNome(nomeOriginal);
        let principio = nomeNormalizado.split(" ")[0];

        dados.medicamentos.push({
            nome_original: nomeOriginal, 
            principio: principio, 
            texto: `${quantidade} ${unidadeConvertida} de ${nomeOriginal}`, 
            retorno: retorno
        });
    }
    return dados;
}

function gerar(){
    let texto = document.getElementById("entrada").value;
    let dados = extrairDados(texto);
    let listaMeds = dados.medicamentos.map(m=>m.texto);
    
    if(listaMeds.length === 0) {
        document.getElementById("saida").textContent = "Nenhum medicamento reconhecido. Verifique se copiou todo o texto da tela.";
        document.getElementById("lista").innerHTML = "";
        return;
    }

    let controlados=[];
    let continuos=[];

    dados.medicamentos.forEach(m=>{
        let principio = m.principio;
        let retorno = m.retorno;

        if(!/\d{2}\/\d{2}\/\d{4}/.test(retorno)) return;

        if(medicacoesControladas.has(principio)){
            controlados.push(`${m.nome_original} em ${retorno}`);
        } else if(!medicacoesAgudas.has(principio)){
            continuos.push(retorno);
        }
    });

    let textoRetorno="";

    if(controlados.length){
        textoRetorno += "\nMedicamentos de uso controlado com previsão de nova dispensação com nova receita médica a partir de:\n" + controlados.map(x=>"• "+x).join("\n") + "\n";
    }

    if(continuos.length){
        let datas = continuos.map(d=>{
            let [dia,mes,ano]=d.split("/");
            return new Date(ano,mes-1,dia);
        });
        let menor = new Date(Math.min(...datas));
        let menorFormatado = String(menor.getDate()).padStart(2,"0")+"/"+String(menor.getMonth()+1).padStart(2,"0")+"/"+menor.getFullYear();
        textoRetorno += `\nMedicamentos de uso contínuo com previsão de nova dispensação a partir de ${menorFormatado}.`;
    }

    let textoFinal = `Paciente comparece à farmácia para retirada de medicamentos.\n\nForam dispensados:\n${listaMeds.join("\n")}\n\nReceita prescrita por ${dados.profissional} em ${dados.data_prescricao}.\n\nOrientado quanto ao uso correto das medicações.\n${textoRetorno}`;

    document.getElementById("saida").textContent = textoFinal;

    let ul = document.getElementById("lista");
    ul.innerHTML="";
    dados.medicamentos.forEach(m=>{
        let li=document.createElement("li");
        li.textContent=m.texto;
        ul.appendChild(li);
    });
}

function copiar(){
    let texto = document.getElementById("saida").textContent;
    if(!texto) return;

    let botao = document.getElementById("botaoCopiar");

    navigator.clipboard.writeText(texto).then(()=>{
        botao.textContent = "Copiado ✓";
        botao.style.background = "#2e7d32";
        setTimeout(()=>{
            botao.textContent = "Copiar texto";
            botao.style.background = "#2f6fed";
        },2000);
    });
}

async function processarTudo() {
    const btnMagico = document.getElementById("btnMagico");
    
    try {
        const textoCopiado = await navigator.clipboard.readText();
        
        if (!textoCopiado.trim()) {
            alert("A área de transferência está vazia. Copie os dados do paciente primeiro.");
            return;
        }

        document.getElementById("entrada").value = textoCopiado;
        gerar();

        const textoGerado = document.getElementById("saida").textContent;
        
        if (textoGerado && !textoGerado.includes("Nenhum medicamento reconhecido")) {
            await navigator.clipboard.writeText(textoGerado);
            btnMagico.textContent = "Processado e Copiado! ✓";
            btnMagico.style.background = "#2e7d32";
        } else {
            btnMagico.textContent = "Falha ao extrair dados";
            btnMagico.style.background = "#d32f2f";
        }
        
        setTimeout(()=>{
            btnMagico.textContent = "Gerar Evolução";
            btnMagico.style.background = "#00897b";
        }, 2500);

    } catch (err) {
        console.error("Erro ao acessar o clipboard: ", err);
        alert("O navegador bloqueou a leitura da área de transferência. Use o Modo Manual logo abaixo.");
    }
}
</script>

</body>
</html>
