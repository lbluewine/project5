<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Gerador de Evolução de Dispensação</title>

<style>

body{
font-family:Arial;
background:#121212;
color:#e4e4e4;
margin:40px;
}

.container{
max-width:900px;
margin:auto;
background:#1e1e1e;
padding:30px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.6);
}

textarea{
width:100%;
padding:10px;
margin-top:10px;
margin-bottom:15px;
background:#2a2a2a;
color:#ffffff;
border:1px solid #444;
border-radius:6px;
}

textarea:focus{
outline:none;
border-color:#6aa9ff;
}

button{
padding:10px 20px;
margin-right:10px;
cursor:pointer;
border:none;
border-radius:6px;
background:#2f6fed;
color:white;
font-weight:bold;
transition: background 0.25s;
}

button:hover{
background:#1f56c5;
}

.result{
white-space:pre-line;
background:#2a2a2a;
padding:15px;
border:1px solid #444;
border-radius:6px;
}

ul{
padding-left:20px;
}

li{
margin-bottom:4px;
}

</style>
</head>

<body>

<div class="container">

<h2>Gerador de Evolução de Dispensação</h2>

<p>1. Ctrl+A na tela da dispensação</p>
<p>2. Ctrl+C</p>
<p>3. Cole abaixo</p>

<textarea id="entrada" rows="12"></textarea>

<button onclick="gerar()">Gerar Evolução</button>
<button id="botaoCopiar" onclick="copiar()">Copiar texto</button>

<h3>Texto gerado</h3>
<div id="saida" class="result"></div>

<h3>Medicamentos identificados</h3>
<ul id="lista"></ul>

</div>

<script>

const controlados = new Set([
"AMITRIPTILINA","BIPERIDENO","CARBAMAZEPINA","CARBONATO",
"CLONAZEPAM","CLORPROMAZINA","DIAZEPAM","FENITOINA",
"FENOBARBITAL","FLUOXETINA","HALOPERIDOL","IMIPRAMINA",
"LEVOMEPROMAZINA","METILFENIDATO","MORFINA","RISPERIDONA",
"SERTRALINA"
]);

const agudos = new Set([
"DIPIRONA","PARACETAMOL","IBUPROFENO",
"AMOXICILINA","AZITROMICINA","MIKANIA"
]);

function normalizar(txt){

return txt
.toUpperCase()
.normalize("NFD")
.replace(/[\u0300-\u036f]/g,"");

}

function limparQuantidade(valor){

valor = valor.replace(/\./g,"").replace(",",".");
return parseInt(parseFloat(valor));

}

function extrairDados(texto){

let dados={
profissional:"____________",
data_prescricao:"____________",
medicamentos:[]
};

let profissional = texto.match(/Profissional\s*\n?([A-ZÁ-Ú\s]+)×/);

if(profissional){
dados.profissional = profissional[1].trim();
}

let prescricao = texto.match(/Data da Prescrição\s*\n(\d{2}\/\d{2}\/\d{4})/);

if(prescricao){
dados.data_prescricao = prescricao[1];
}

let blocos = texto.split(/\n\s*\(\s*\d+\s*\)\s*/);

for(let i=1;i<blocos.length;i++){

let linhas = blocos[i]
.split("\n")
.map(l=>l.trim())
.filter(l=>l);

if(linhas.length < 7) continue;

let nome = linhas[0];
let unidade = linhas[1];

const unidadesValidas=["CP","FR","AMP","TB","ML","G"];

if(!unidadesValidas.includes(unidade)) continue;

let quantidade;

try{
quantidade = limparQuantidade(linhas[6]);
}catch{
continue;
}

let retorno = linhas[7] || "";

let principio = normalizar(nome).split(" ")[0];

dados.medicamentos.push({
nome:nome,
principio:principio,
texto:`${quantidade} ${unidade} ${nome}`,
retorno:retorno
});

}

return dados;

}

function gerar(){

let texto = document.getElementById("entrada").value;

let dados = extrairDados(texto);

let listaMeds = dados.medicamentos.map(m=>"• "+m.texto);

let controladosLista=[];
let continuos=[];

dados.medicamentos.forEach(m=>{

if(!/\d{2}\/\d{2}\/\d{4}/.test(m.retorno)) return;

if(controlados.has(m.principio)){
controladosLista.push(`• ${m.nome} em ${m.retorno}`);
}
else if(!agudos.has(m.principio)){
continuos.push(m.retorno);
}

});

let textoRetorno="";

if(controladosLista.length){

textoRetorno +=
"\nMedicamentos de uso controlado com previsão de nova dispensação com nova receita médica a partir de:\n"
+controladosLista.join("\n");

}

if(continuos.length){

let datas = continuos.map(d=>{

let [dia,mes,ano]=d.split("/");
return new Date(ano,mes-1,dia);

});

let menor = new Date(Math.min(...datas));

let menorFormatado =
String(menor.getDate()).padStart(2,"0")+"/"+
String(menor.getMonth()+1).padStart(2,"0")+"/"+
menor.getFullYear();

textoRetorno +=
`\n\nMedicamentos de uso contínuo com previsão de nova dispensação a partir de ${menorFormatado}.`;

}

let textoFinal =
`Paciente comparece à farmácia para retirada de medicamentos.

Foram dispensados:
${listaMeds.join("\n")}

Receita prescrita por ${dados.profissional} em ${dados.data_prescricao}.

Orientado quanto ao uso correto das medicações.${textoRetorno}`;

document.getElementById("saida").textContent = textoFinal;

let ul = document.getElementById("lista");
ul.innerHTML="";

dados.medicamentos.forEach(m=>{

let li=document.createElement("li");
li.textContent=m.texto;
ul.appendChild(li);

});

}

function copiar(){

let texto = document.getElementById("saida").textContent;
let botao = document.getElementById("botaoCopiar");

navigator.clipboard.writeText(texto).then(()=>{

botao.textContent="Copiado ✓";
botao.style.background="#2e7d32";

setTimeout(()=>{
botao.textContent="Copiar texto";
botao.style.background="#2f6fed";
},2000);

});

}

</script>

</body>
</html>
